<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vander Furniture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        html, body {
            height: 100%;
            background: #fff;
        }
        .container {
            display: flex;
            width: 100%;
            height: 100vh;
        }
        .left-side {
            width: 65%;
            background-image: url('images/你的家具图.jpg');
            background-size: cover;
            background-position: center;
        }
        .right-side {
            width: 35%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 60px;
            background: #ffffff;
        }
        .right-side h1 {
            font-size: 52px;
            font-weight: 600;
            color: #222;
            margin-bottom: 20px;
        }
        .right-side p {
            font-size: 20px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-side"></div>
    <div class="right-side">
        <h1>Vander Furniture</h1>
        <p>高端极简家具 · 品质生活</p>
    </div>
</div>

</body>
</html>
